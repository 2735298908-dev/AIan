name: AI前沿日报

on:
  # 临时/配置变更验证：仅工作流文件本身更新时触发。
  push:
    branches: [main]
    paths:
      - ".github/workflows/daily-ai-news.yml"
  schedule:
    # GitHub Actions 使用 UTC；01:00 UTC = 北京时间/台北时间 09:00。
    - cron: "0 1 * * *"
  workflow_dispatch:
    inputs:
      report_date:
        description: "指定报告日期（YYYY-MM-DD）；留空则检查前一天"
        required: false
        type: string

permissions:
  contents: write
  models: read

concurrency:
  group: daily-ai-news
  cancel-in-progress: false

jobs:
  build-and-send:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      REPORT_TIMEZONE: Asia/Shanghai
      REPORT_DATE: ${{ github.event.inputs.report_date }}
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      FEISHU_WEBHOOK: ${{ secrets.FEISHU_WEBHOOK }}
      GITHUB_MODEL: openai/gpt-4o-mini
      SEND_EMPTY_REPORT: "true"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Generate and send AI daily report
        run: python scripts/ai_news_agent.py

      - name: Save report and deduplication history
        run: |
          if [[ -z "$(git status --porcelain -- data reports)" ]]; then
            echo "No report state changes."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data reports
          git commit -m "chore: update AI news report"
          git pull --rebase origin "${GITHUB_REF_NAME}"
          git push origin "HEAD:${GITHUB_REF_NAME}"
